version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BOTTEU — Docker Compose
#
# Services:
#   postgres  — PostgreSQL 16 (production DB)
#   web       — Flask + Gunicorn + APScheduler (bot ticks run in-process)
#   nginx     — Reverse proxy / SSL termination
#   certbot   — Auto-renew TLS certs (runs as a cron loop)
#
# Celery worker and beat have been removed: the bot scheduler now runs
# as a background thread inside the web process (APScheduler, zero extra deps).
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: botteu_db
      POSTGRES_USER: botteu_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botteu_user -d botteu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask / Gunicorn / APScheduler ────────────────────────────────────
  # IMPORTANT: --workers 1 is intentional.
  # APScheduler runs inside the Flask process. Multiple workers would each
  # start their own scheduler → duplicate bot ticks → double orders.
  # Use --threads for concurrency instead.
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://botteu_user:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/botteu_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - instance_data:/app/instance
      - static_data:/app/app/static
      - collector_data:/app/collector/data
    expose:
      - "5000"

  # ── Nginx reverse proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web

  # ── Certbot (auto-renewal loop) ────────────────────────────────────────
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

  # ── Data Collector (Binance WebSocket → CSV) ───────────────────────────
  # Streams 1m klines for multiple symbols, aggregates to 5m/15m/30m/1h/4h/1d,
  # computes indicators, cleans data. Shared volume with web service.
  collector:
    build: ./collector
    restart: unless-stopped
    environment:
      SYMBOLS: ${COLLECTOR_SYMBOLS:-BTCUSDT}
      DATA_DIR: /app/data
      ROLL_WINDOW: ${COLLECTOR_ROLL_WINDOW:-7770}
      MAX_RECONNECTS: 20
    volumes:
      - collector_data:/app/data

volumes:
  postgres_data:
  instance_data:
  static_data:
  certbot_www:
  certbot_conf:
  collector_data:

