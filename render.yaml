services:
  # ── BOTTEU — single web service (Flask + bot ticks + Binance collector) ───
  # The collector runs as a background thread inside the same process.
  # Requires starter plan (free tier sleeps → WebSocket drops + bots miss ticks).
  - type: web
    name: botteu
    runtime: python
    region: frankfurt
    plan: starter              # always-on: bots + WebSocket need persistent uptime
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py run:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false            # set in Render dashboard → Environment
      - key: DB_SCHEMA
        value: botteu
      - key: FERNET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        value: "BOTTEU <andrii.it.info@gmail.com>"
      - key: APP_URL
        value: https://botteu.onrender.com
      - key: TELEGRAM_WEBHOOK_URL
        value: https://botteu.onrender.com/telegram/webhook
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      # ── Persistent storage paths (both ML models and collector data on one disk)
      - key: ML_MODELS_DIR
        value: /opt/render/data/ml_models
      - key: DATA_DIR
        value: /opt/render/data/collector
      # ── Inline collector: symbols to stream (comma-separated).
      # Leave empty to disable the collector thread.
      - key: COLLECTOR_SYMBOLS
        value: BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT
      - key: COLLECTOR_ROLL_WINDOW
        value: "7770"          # ~5.4 days of 1m data per symbol
    disk:
      name: app-data
      mountPath: /opt/render/data
      sizeGB: 3                # ML models (~1 GB) + collector CSVs (~2 GB for 4 symbols)
